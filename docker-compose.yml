services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - cv_uploads:/app/uploads
    networks:
      - internal
      - external
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - backend
    volumes:
      - ./collector:/app
      - tg_session:/app/session
      - cv_uploads:/app/uploads
    networks:
      - internal
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - external
    command: pnpm dev --host

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  pg_data:
  tg_session:
  cv_uploads:
