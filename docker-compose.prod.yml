services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - cv_uploads:/app/uploads
    networks:
      - internal
      - external
    restart: unless-stopped
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
      target: production
    env_file: .env
    depends_on:
      - backend
    volumes:
      - tg_session:/app/session
      - cv_uploads:/app/uploads
    networks:
      - internal
    restart: unless-stopped
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8001

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    networks:
      - external
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - external
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  pg_data:
  tg_session:
  cv_uploads:
  caddy_data:
  caddy_config:
